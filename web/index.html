<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">Memory Agent</div>
        </header>

        <!-- Chat Container -->
        <main class="chat-container" id="chatContainer">
            <div class="welcome-message" id="welcomeMessage">
                <p>开始与 Agent 对话</p>
            </div>
            <!-- Messages will be inserted here -->
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-wrapper" id="inputWrapper">
                <!-- Skills Dropdown -->
                <div class="skills-dropdown" id="skillsDropdown">
                    <div class="skills-list" id="skillsList"></div>
                </div>

                <!-- File Preview -->
                <div class="file-preview" id="filePreview" style="display: none;">
                    <span class="file-icon">📎</span>
                    <span class="file-name" id="fileName"></span>
                    <button class="file-remove" id="fileRemove">&times;</button>
                </div>

                <!-- Textarea -->
                <textarea
                    class="input-textarea"
                    id="inputTextarea"
                    placeholder="输入消息..."
                    rows="1"
                ></textarea>

                <!-- Toolbar -->
                <div class="toolbar">
                    <button class="attach-btn" id="attachBtn" title="添加文件">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                        </svg>
                    </button>
                    <input type="file" id="fileInput" style="display: none;">
                    <button class="skills-btn" id="skillsBtn" title="技能">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="footer">
                <span class="footer-text">Agent 基于 MiniMax-M2.7</span>
                <button class="send-btn" id="sendBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M22 2L11 13"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
